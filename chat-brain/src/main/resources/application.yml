spring:
  config:
    import: optional:file:.env[.properties]

communitybrain:
  events:
    subscribers:
      enabled: ${COMMUNITYBRAIN_SUBSCRIBER_EVENTS_ENABLED:true}
  ai:
    enabled: ${COMMUNITYBRAIN_AI_ENABLED:true}
    provider: ${COMMUNITYBRAIN_AI_PROVIDER:fake}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.5}
      connect-timeout: ${OPENAI_CONNECT_TIMEOUT:10s}
      read-timeout: ${OPENAI_READ_TIMEOUT:60s}

chatbrain:
  discord:
    enabled: ${DISCORD_ENABLED:false}
    bot-token: ${DISCORD_BOT_TOKEN:}
    guild-id: ${DISCORD_GUILD_ID:}
    channel-id: ${DISCORD_CHANNEL_ID:}
