spring.application.name=chat-brain

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# MySQL Database
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chat_brain}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rohit }
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ===============================
# YouTube
# ===============================
chatbrain.youtube.enabled=${YOUTUBE_ENABLED:true}
chatbrain.youtube.credentials-path=${YOUTUBE_CREDENTIALS_PATH:config/youtube/client-secret.json}
chatbrain.youtube.tokens-directory=${YOUTUBE_TOKEN_PATH:data/tokens/}
chatbrain.youtube.oauth-port=${YOUTUBE_OAUTH_PORT:8888}
chatbrain.youtube.minimum-poll-interval=${YOUTUBE_MINIMUM_POLL_INTERVAL:10s}
chatbrain.youtube.retry-interval=${YOUTUBE_RETRY_INTERVAL:30s}

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.com.chatbrain=DEBUG
